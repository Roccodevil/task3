services:
  app:
    container_name: task3-app
    build:
      context: .
      dockerfile: Dockerfile
    image: task3-app:latest
    ports:
      - "5000:5000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped